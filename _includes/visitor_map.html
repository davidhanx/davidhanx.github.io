<!-- Visitor world map + counter (Flag Counter, anonymous, no account).
     Hidden gracefully if blocked by ad blockers (EasyPrivacy blocks all
     third-party counters). To switch provider (e.g. MapMyVisitors),
     replace this whole block. Stats: https://info.flagcounter.com/Z0Ii -->
<div class="visitor-map" style="margin-top: 16px; text-align: center;">
  <a href="https://info.flagcounter.com/Z0Ii" target="_blank" rel="noopener noreferrer"><img
    src="https://s01.flagcounter.com/map/Z0Ii/size_s/txt_000000/border_CCCCCC/pageviews_1/viewers_0/flags_0/"
    alt="Visitor map and page-view counter"
    style="max-width: 100%; height: auto; border-radius: 4px;"
    onerror="this.closest('.visitor-map').style.display='none'"></a>
</div>
